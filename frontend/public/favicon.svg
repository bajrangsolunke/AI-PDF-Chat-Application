<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Atlas">
  <title>Atlas</title>
  <!-- Warm tile background — matches the app's bg-bg token -->
  <rect width="64" height="64" rx="12" fill="#faf8f4"/>

  <!-- Letter A: two angled strokes in ink -->
  <line x1="32" y1="12" x2="13" y2="53" stroke="#1f1d1a" stroke-width="4.5" stroke-linecap="square"/>
  <line x1="32" y1="12" x2="51" y2="53" stroke="#1f1d1a" stroke-width="4.5" stroke-linecap="square"/>

  <!-- Crossbar in terracotta accent — echoes the brand wordmark -->
  <line x1="22" y1="37" x2="42" y2="37" stroke="#c25c3a" stroke-width="4.5" stroke-linecap="square"/>

  <!-- Editorial hairline beneath the mark -->
  <rect x="26" y="56" width="12" height="1.5" fill="#c25c3a" opacity="0.7"/>
</svg>
