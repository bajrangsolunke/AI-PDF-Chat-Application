services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    environment:
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
      LLM_PROVIDER: ${LLM_PROVIDER:-groq}
      EMBED_PROVIDER: ${EMBED_PROVIDER:-gemini}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_CHAT_MODEL: ${GROQ_CHAT_MODEL:-llama-3.3-70b-versatile}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_CHAT_MODEL: ${GEMINI_CHAT_MODEL:-gemini-1.5-flash}
      GEMINI_EMBED_MODEL: ${GEMINI_EMBED_MODEL:-models/gemini-embedding-001}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_EMBED_MODEL: ${OPENAI_EMBED_MODEL:-text-embedding-3-small}
      DATABASE_URL: sqlite:///./app.db
      CHROMA_DIR: ./chroma
      UPLOAD_DIR: ./uploads
      CORS_ORIGINS: http://localhost:5173
    volumes:
      - backend_data:/app/uploads
      - backend_chroma:/app/chroma
      - backend_db:/app/db
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend_data:
  backend_chroma:
  backend_db:
